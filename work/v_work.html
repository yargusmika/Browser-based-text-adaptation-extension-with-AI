<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Kitcune!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="katex.min.css">
</head>
<body>
    <div class="loading off">
        <p>Хозяин потерпи, Нейро-тян работает, ня~</p>
        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

    </div>
    <div class="aside">
        <div class="row gap-1">
            <div class="aside_item">
                <img src="images/icon64.png" alt="Ai">
                <p>Ai Kitsune</p>
            </div>
            <br>
            <div click-href="start" class="url">
                <p>Изначальное</p>
            </div>
            <div click-href="start_point1" class="url">
                <p>Объясни для пятикласника</p>
                <div click-href="start_point1_reload">↻</div>
            </div>
            <div click-href="start_point2" class="url">
                <p>Объясни упрощая</p>
                <div click-href="start_point2_reload">↻</div>
            </div>
            <div click-href="start_point3" class="url">
                <p>Убери терминологию</p>
                <div click-href="start_point3_reload">↻</div>
            </div>
            <div click-href="anime_kitsune" class="url">
                <p>Кицунэ</p>
                <div click-href="anime_kitsune_reload">↻</div>
            </div>
            <div click-href="HIGHT" class="url">
                <p>Сложный уровень</p>
                <div click-href="HIGHT_reload">↻</div>
            </div>
            
        </div>
    </div>
    <div class="d-flex">
        <div class="container">
            <div class="chat">

            </div>
        </div>
    </div>
    <script src="marked.js"></script>
    <script src="katex.min.js"></script>
    <script src="auto-render.min.js" integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz" crossorigin="anonymous"></script>
    <script src="v_script.js"></script>

</body>
</html>
